[defaults]
timezone = "Asia/Shanghai"
default_tif = "day"

[defaults.email]
subject_prefix = "[stock-trader]"

[brokers.longbridge]
kind = "longbridge"

[brokers.ibkr]
kind = "ibkr"

[[tasks]]
name = "ibkr_us_rebalance"
broker = "ibkr"
action = "place"
schedule = { time = "09:30", weekdays = ["mon", "tue", "wed", "thu", "fri"] }
side = "buy"
pricing = { kind = "counterparty" }
session = { extended_hours = true }
shared_budget = { amount = 10000.0 }
risk = { allow_margin = true }
client_tag = "pm2-us-rebalance"
notify = { email = { to = ["ops@example.com"], on = ["success", "failure"] } }

[[tasks.symbols]]
ticker = "AAPL"
market = "us"
conid = "265598"
weight = 0.6

[[tasks.symbols]]
ticker = "MSFT"
market = "us"
conid = "272093"
weight = 0.4

[[tasks]]
name = "ibkr_cancel_us_rebalance"
broker = "ibkr"
action = "cancel"
schedule = { time = "15:55", weekdays = ["mon", "tue", "wed", "thu", "fri"] }
side = "buy"
client_tag = "pm2-us-rebalance"

[[tasks.symbols]]
ticker = "AAPL"
market = "us"
conid = "265598"

[[tasks.symbols]]
ticker = "MSFT"
market = "us"
conid = "272093"

[[tasks]]
name = "longbridge_manual_limit"
broker = "longbridge"
action = "place"
side = "buy"
pricing = { kind = "limit", price = 50.0 }
risk = { allow_margin = false }

[[tasks.symbols]]
ticker = "700"
market = "hk"
quantity = 100
